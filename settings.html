<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>c_manager_android — Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header>
    <h1>Settings</h1>
    <button id="save-btn" type="button">Save</button>
  </header>

  <section id="duration-section">
    <h2>Long Press Duration</h2>
    <label for="long-press-input">Hold duration before popup appears (ms)</label>
    <input id="long-press-input" type="number" min="200" max="5000" step="100" />
  </section>

  <section id="resource-source-section">
    <h2>Resource Source</h2>
    <label for="resources-file-input">Import JSON resource file (optional)</label>
    <input id="resources-file-input" type="file" />
    <button id="import-resources-btn" type="button">Import File</button>
    <label for="resources-json-input">Or paste JSON directly</label>
    <textarea id="resources-json-input" rows="6" placeholder='[{"label":"Hello","text":["Hello World"]}]'></textarea>
    <button id="import-json-btn" type="button">Import Pasted JSON</button>
    <label for="resources-url-input">Or load JSON from URL</label>
    <input id="resources-url-input" type="url" placeholder="https://gist.githubusercontent.com/.../raw/resources.json" />
    <button id="import-url-btn" type="button">Import From URL</button>
    <small>
      Imported snippets are staged in the editor; tap Save to apply them.
      URL mode expects top-level array JSON and works well with raw gist URLs.
    </small>
  </section>

  <section id="snippets-section">
    <h2>Snippets</h2>
    <div id="snippet-list"></div>
    <button id="add-snippet-btn" type="button">+ Add Snippet</button>
  </section>

  <div id="status" role="status" aria-live="polite"></div>

  <script src="injector.resources.js"></script>
  <script src="settings.js"></script>
</body>
</html>
