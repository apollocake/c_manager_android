<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>c_manager_android — Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header>
    <h1>Settings</h1>
    <button id="save-btn" type="button">Save</button>
  </header>

  <section id="duration-section">
    <h2>Long Press Duration</h2>
    <label for="long-press-input">Hold duration before popup appears (ms)</label>
    <input id="long-press-input" type="number" min="200" max="5000" step="100" />
  </section>

  <section id="resource-source-section">
    <h2>Resource Source</h2>
    <label for="resources-url-input">Load JSON from URL</label>
    <input id="resources-url-input" type="url" placeholder="https://gist.githubusercontent.com/.../raw/resources.json" />
    <small>
      Save the URL here to make the popup fetch its JSON at runtime. If the URL is empty,
      the extension falls back to bundled resources.
    </small>
  </section>

  <div id="status" role="status" aria-live="polite"></div>

  <script src="settings.js"></script>
</body>
</html>
